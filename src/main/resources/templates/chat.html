<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HexaDocs Chat</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        #chat {
            border: 1px solid #ccc;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

        .msg { margin: 6px 0; }
        .me { color: blue; }
        .bot { color: green; }

        input {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<h2>HexaDocs Chat</h2>

<!-- KB selector -->
<div>
    <label>Knowledge Base ID:</label><br/>
    <input id="kbId"
           style="width: 400px;"
           placeholder="Enter knowledgeBaseId..." />
</div>

<br/>

<div id="chat"></div>

<input id="input" type="text" placeholder="Ask something..." style="width: 300px;" />
<button onclick="sendMessage()">Send</button>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

<script>
    let client;

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.innerText = text;

        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function connect() {
        client = new StompJs.Client({
            brokerURL: "ws://localhost:8080/ws",
            debug: (msg) => console.log(msg)
        });

        client.onConnect = () => {
            addMessage("Connected", "bot");

            client.subscribe("/topic/chat", (message) => {
                addMessage("Bot: " + message.body, "bot");
            });
        };

        client.activate();
    }

    function sendMessage() {
        const input = document.getElementById("input");
        const kbId = document.getElementById("kbId").value;
        const text = input.value;

        if (!text) return;

        if (!kbId) {
            addMessage("Please enter KnowledgeBaseId first!", "bot");
            return;
        }

        addMessage("Me: " + text, "me");

        client.publish({
            destination: "/app/chat.ask",
            body: JSON.stringify({
                knowledgeBaseId: kbId,
                question: text
            })
        });

        input.value = "";
    }

    connect();
</script>

</body>
</html>
