<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>HexaDocs Workspace</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .section {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 15px;
        }

        #chat {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }

    </style>
</head>

<body>

<h2>HexaDocs Workspace</h2>

<div class="section">
    <h3>Create Knowledge Base</h3>

    <input id="kbName" placeholder="Knowledge Base name" />
    <button onclick="createKB()">Create</button>

    <p>Active KB: <b id="activeKb">None</b></p>
</div>

<div class="section">
    <h3>Upload Document</h3>

    <input type="file" id="file" />
    <input type="text" id="docName" placeholder="Document name" />
    <button onclick="uploadDoc()">Upload</button>
</div>

<div class="section">
    <h3>Chat</h3>

    <div id="chat"></div>

    <input id="input" placeholder="Ask something..." style="width:300px;" />
    <button onclick="sendMessage()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

<script>
    let client;
    let activeKnowledgeBaseId = null;

    function logChat(text, type) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.innerText = text;

        const chat = document.getElementById("chat");
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function connect() {
        client = new StompJs.Client({
            brokerURL: "ws://localhost:8080/ws",
            debug: (msg) => console.log(msg)
        });

        client.onConnect = () => {
            logChat("Connected", "bot");

            client.subscribe("/topic/chat", (message) => {
                const data = JSON.parse(message.body);
                logChat("Bot: " + data.answer, "bot");
            });
        };

        client.activate();
    }

    async function createKB() {
        const name = document.getElementById("kbName").value;

        const res = await fetch("/api/knowledge-bases", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name })
        });

        const data = await res.json();

        activeKnowledgeBaseId = data.id;

        document.getElementById("activeKb").innerText = activeKnowledgeBaseId;

        logChat("Knowledge Base created: " + activeKnowledgeBaseId, "bot");
    }

    async function uploadDoc() {
        if (!activeKnowledgeBaseId) {
            alert("Create or select a Knowledge Base first!");
            return;
        }

        const file = document.getElementById("file").files[0];
        const name = document.getElementById("docName").value;

        const formData = new FormData();
        formData.append("file", file);
        formData.append("name", name);
        formData.append("knowledgeBaseId", activeKnowledgeBaseId);

        const res = await fetch("/api/documents/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        logChat("Document uploaded: " + data.documentId, "bot");
    }

    function sendMessage() {
        const input = document.getElementById("input");
        const text = input.value;

        if (!activeKnowledgeBaseId) {
            alert("Create a Knowledge Base first!");
            return;
        }

        if (!text) return;

        logChat("Me: " + text, "me");

        client.publish({
            destination: "/app/chat.ask",
            body: JSON.stringify({
                knowledgeBaseId: activeKnowledgeBaseId,
                question: text
            })
        });

        input.value = "";
    }

    connect();
</script>

</body>
</html>
